# =============================================================================
# Nexora Platform — docker-compose.yml
# =============================================================================
# Run the entire platform with: docker-compose up
#
# Services:
#   - postgres:  PostgreSQL 16 (primary database — Tier 2/3)
#   - backend:   Rust gateway (port 8080) — all API routes + WebSocket + SSE
#   - frontend:  SvelteKit app (port 3000) — proxies /api to the backend
#
# PostgreSQL is the DEFAULT database. SQLite is available as a fallback
# for Tier-1 (edge) deployments only.

version: "3.9"

services:
  # ── PostgreSQL (primary database) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=nexora
      - POSTGRES_PASSWORD=nexora
      - POSTGRES_DB=nexora
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Rust gateway) ────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - NEXORA_BIND_ADDR=0.0.0.0:8080
      - DATABASE_URL=postgresql://nexora:nexora@postgres:5432/nexora
      - RUST_LOG=info
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (SvelteKit) ──────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
    driver: local
