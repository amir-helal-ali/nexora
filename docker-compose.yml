# docker-compose.yml — Nexora Platform
# ============================================================
# يقوم بتشغيل:
# - PostgreSQL (قاعدة البيانات الأساسية)
# - Nexora Backend (البوابة + النواة)
# - Nexora Frontend (SvelteKit + nginx)
# - Prometheus (مراقبة المقاييس)
# - Grafana (لوحات المراقبة)

version: '3.8'

services:
  # ============================================================
  # PostgreSQL — قاعدة البيانات الأساسية
  # ============================================================
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexora
      POSTGRES_USER: nexora
      POSTGRES_PASSWORD: nexora_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexora"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ============================================================
  # Nexora Backend — البوابة + النواة
  # ============================================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - NEXORA_BIND=0.0.0.0:8080
      - RUST_LOG=info
      - DATABASE_URL=postgres://nexora:nexora_secret@postgres:5432/nexora
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # ============================================================
  # Nexora Frontend — SvelteKit + nginx
  # ============================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ============================================================
  # Prometheus — مراقبة المقاييس
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./docs/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped

  # ============================================================
  # Grafana — لوحات المراقبة
  # ============================================================
  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docs/grafana-dashboard.json:/etc/grafana/provisioning/dashboards/nexora.json
    depends_on:
      - prometheus
    restart: unless-stopped

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
