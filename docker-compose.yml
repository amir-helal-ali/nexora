# =============================================================================
# Nexora Platform — docker-compose.yml
# =============================================================================
# Run the entire platform with: docker-compose up
#
# Services:
#   - backend:  Rust gateway (port 8080) — serves all API routes + WebSocket + SSE
#   - frontend: SvelteKit app (port 3000) — proxies /api to the backend
#
# The backend persists data to a SQLite file in ./data/nexora.db

version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - NEXORA_BIND_ADDR=0.0.0.0:8080
      - NEXORA_DB_PATH=/app/data/nexora.db
      - RUST_LOG=info
    volumes:
      - nexora-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  nexora-data:
    driver: local
