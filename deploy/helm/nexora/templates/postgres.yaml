{{- if .Values.postgresql.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nexora-postgres
  namespace: {{ .Values.namespace }}
  labels:
    app: nexora-postgres
spec:
  serviceName: nexora-postgres
  replicas: 1
  selector:
    matchLabels:
      app: nexora-postgres
  template:
    metadata:
      labels:
        app: nexora-postgres
    spec:
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image }}
          env:
            - name: POSTGRES_DB
              value: {{ .Values.postgresql.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgresql.user | quote }}
            - name: POSTGRES_PASSWORD
              value: {{ .Values.postgresql.password | quote }}
          ports:
            - containerPort: {{ .Values.postgresql.port }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-postgres
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: nexora-postgres
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: {{ .Values.postgresql.port }}
{{- end }}
