apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-backend
  namespace: {{ .Values.namespace }}
  labels:
    app: nexora-backend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nexora-backend
  template:
    metadata:
      labels:
        app: nexora-backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.backend.repository }}:{{ .Values.image.backend.tag }}"
          imagePullPolicy: {{ .Values.image.backend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}
          env:
            - name: RUST_LOG
              value: {{ .Values.backend.env.RUST_LOG | quote }}
            - name: DATABASE_URL
              value: "postgres://{{ .Values.postgresql.user }}:{{ .Values.postgresql.password }}@nexora-postgres:{{ .Values.postgresql.port }}/{{ .Values.postgresql.database }}"
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-backend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: nexora-backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-frontend
  namespace: {{ .Values.namespace }}
  labels:
    app: nexora-frontend
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: nexora-frontend
  template:
    metadata:
      labels:
        app: nexora-frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: {{ .Values.frontend.port }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-frontend
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: nexora-frontend
  ports:
    - port: {{ .Values.frontend.port }}
      targetPort: {{ .Values.frontend.port }}
