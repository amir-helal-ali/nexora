# Nexora Helm Chart — القيم الافتراضية
# ============================================================

# الإعدادات العامة
replicaCount: 2

image:
  backend:
    repository: nexora/backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: nexora/frontend
    tag: latest
    pullPolicy: IfNotPresent

# الخدمات
backend:
  port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  env:
    RUST_LOG: info

frontend:
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi

# PostgreSQL
postgresql:
  enabled: true
  image: postgres:16-alpine
  database: nexora
  user: nexora
  password: nexora_secret
  storage: 10Gi
  port: 5432

# Prometheus
prometheus:
  enabled: true
  port: 9090
  storage: 5Gi

# Grafana
grafana:
  enabled: true
  port: 3001
  adminPassword: admin
  storage: 5Gi

# Ingress
ingress:
  enabled: true
  className: nginx
  host: nexora.local
  tls:
    enabled: false

# مساحة الاسم
namespace: nexora
