# Prometheus configuration for Nexora
# ============================================================

global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Nexora Backend metrics
  - job_name: 'nexora-backend'
    static_configs:
      - targets: ['backend:8080']
    metrics_path: '/api/monitoring/prometheus'
    scrape_interval: 5s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alert rules (optional)
rule_files:
  # - /etc/prometheus/rules.yml
