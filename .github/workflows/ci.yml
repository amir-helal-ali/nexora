# Nexora CI/CD Pipeline
#
# Runs on every push and PR to main:
# 1. Format check (cargo fmt --check)
# 2. Lint (cargo clippy)
# 3. Tests (cargo test --workspace)
# 4. Build release (cargo build --release)
# 5. Frontend build (npm run build)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  rust-checks:
    name: Rust Format + Clippy + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true  # Don't block on clippy warnings for now

      - name: Tests
        run: cargo test --workspace

      - name: Build release
        run: cargo build --release --bin gateway-demo

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f Dockerfile.backend -t nexora-backend .

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t nexora-frontend .
