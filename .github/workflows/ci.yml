name: CI/CD Pipeline

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ==================================================================
  # Build + Test (Rust) — يستخدم 1.89 بسبب async-graphql 7.x
  # ==================================================================
  build-rust:
    name: Build & Test (Rust 1.89)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.89
        uses: dtolnay/rust-toolchain@1.89.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-1.89-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-1.89-

      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true  # التحذيرات لا تفشل البناء

      - name: Build workspace (--locked)
        run: cargo build --workspace --locked

      - name: Run tests
        run: cargo test --workspace --locked
        continue-on-error: true  # بعض الاختبارات تتطلب postgres

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings
        continue-on-error: true  # التحذيرات لا تفشل البناء

  # ==================================================================
  # Build Frontend (SvelteKit)
  # ==================================================================
  build-frontend:
    name: Build Frontend (SvelteKit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: SvelteKit sync
        working-directory: frontend
        run: npx svelte-kit sync

      - name: Build
        working-directory: frontend
        run: npm run build

  # ==================================================================
  # Docker Build Validation — يتحقق أن صور Docker تُبنى بنجاح
  # ==================================================================
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.backend
          push: false
          tags: nexora-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: false
          tags: nexora-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify backend binary exists
        run: docker run --rm nexora-backend:ci sh -c "ls -la /app/gateway-demo"

      - name: Verify nginx serves
        run: docker run --rm -d -p 3001:3000 --name frontend-test nexora-frontend:ci && sleep 3 && curl -sf http://localhost:3001/ && docker stop frontend-test

  # ==================================================================
  # Security Audit
  # ==================================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked || cargo install cargo-audit

      - name: Run audit
        run: cargo audit
        continue-on-error: true  # لا نفشل البناء لثغرات في dev deps

  # ==================================================================
  # Release (on tag)
  # ==================================================================
  release:
    name: Release
    needs: [build-rust, build-frontend, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          draft: false
          prerelease: false
